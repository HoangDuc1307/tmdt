<main id="content" class="wrapper layout-page">
  <section class="pb-lg-20 pb-16">
    <div class="bg-body-secondary py-5">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb breadcrumb-site py-0 d-flex justify-content-center">
          <li class="breadcrumb-item"><a class="text-decoration-none text-body" routerLink="/">Home</a></li>
          <li class="breadcrumb-item active pl-0 d-flex align-items-center" aria-current="page">Reset password</li>
        </ol>
      </nav>
    </div>

    <div class="container">
      <div class="text-center pt-13 mb-12 mb-lg-15">
        <h2 class="fs-36px mb-11 mb-lg-14">Quên mật khẩu</h2>
      </div>

      <div class="row no-gutters">
        <div class="col-lg-6 mx-auto">
          <div class="card border-0 shadow-sm p-10">
            <h3 class="fs-4 mb-8">{{ isResetMode ? 'Đặt lại mật khẩu' : 'Gửi liên kết đặt lại mật khẩu' }}</h3>

            <form *ngIf="!isResetMode" (ngSubmit)="onSendResetLink()">
              <div class="form-group mb-6">
                <label for="email" class="visually-hidden">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  class="form-control"
                  placeholder="Nhập email đăng ký"
                  [(ngModel)]="email"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary w-100" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Đang gửi...' : 'Gửi liên kết' }}
              </button>
            </form>

            <form *ngIf="isResetMode" (ngSubmit)="onResetPassword()">
              <div class="form-group mb-6">
                <label for="new_password" class="visually-hidden">Mật khẩu mới</label>
                <input
                  id="new_password"
                  name="new_password"
                  type="password"
                  class="form-control"
                  placeholder="Mật khẩu mới"
                  [(ngModel)]="newPassword"
                  required
                />
              </div>
              <div class="form-group mb-6">
                <label for="confirm_password" class="visually-hidden">Xác nhận mật khẩu</label>
                <input
                  id="confirm_password"
                  name="confirm_password"
                  type="password"
                  class="form-control"
                  placeholder="Xác nhận mật khẩu"
                  [(ngModel)]="confirmPassword"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary w-100" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Đang cập nhật...' : 'Đặt lại mật khẩu' }}
              </button>
            </form>

            <div *ngIf="message" class="alert alert-success mt-6 mb-0">{{ message }}</div>
            <div *ngIf="error" class="alert alert-danger mt-6 mb-0">{{ error }}</div>

            <a routerLink="/login" class="d-inline-block mt-6">Quay lại đăng nhập</a>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
