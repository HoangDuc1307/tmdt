<header class="main-header bg-body position-relative d-none d-xl-block px-10 py-6">
	<div class="container-fluid">
		<nav class="navbar navbar-light py-0 row no-gutters px-3 px-lg-0">
			<div class="col-md-12 d-flex flex-wrap justify-content-end align-items-center order-0 order-md-1">
				
<div class="color-modes position-relative pe-4">
	<a class="bd-theme btn btn-link nav-link dropdown-toggle d-inline-flex align-items-center justify-content-center text-primary p-0 position-relative rounded-circle" href="#" aria-expanded="true" data-bs-toggle="dropdown" data-bs-display="static" aria-label="Toggle theme (light)">
		<svg class="bi my-1 theme-icon-active"><use href="#moon-stars-fill"></use></svg>
	</a>
	<ul class="dropdown-menu dropdown-menu-end fs-14px" data-bs-popper="static">
		<li>
			<button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="light" aria-pressed="false">
				<svg class="bi me-4 opacity-50 theme-icon"><use href="#sun-fill"></use></svg>
				Sáng
				<svg class="bi ms-auto d-none"><use href="#check2"></use></svg>
			</button>
		</li>
		<li>
			<button type="button" class="dropdown-item d-flex align-items-center active" data-bs-theme-value="dark" aria-pressed="true">
				<svg class="bi me-4 opacity-50 theme-icon"><use href="#moon-stars-fill"></use></svg>
				Tối
				<svg class="bi ms-auto d-none"><use href="#check2"></use></svg>
			</button>
		</li>
		<li>
			<button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="auto" aria-pressed="false">
				<svg class="bi me-4 opacity-50 theme-icon"><use href="#circle-half"></use></svg>
				Tự động
				<svg class="bi ms-auto d-none"><use href="#check2"></use></svg>
			</button>
		</li>
	</ul>
</div>
				<div class="dropdown no-caret px-4 mx-3 py-2">
					<a href="#" class="dropdown-toggle fs-5 text-decoration-none fw-500 lh-1 animation-shake position-relative" data-bs-toggle="dropdown" aria-expanded="false">
						<i class="far fa-bell"></i>
						<span class="badge text-bg-dark rounded-circle" *ngIf="unreadCount() > 0">{{ unreadCount() }}</span>
					</a>
					<div class="dropdown-menu dropdown-menu-end shadow-lg p-0 border-0" style="min-width: 300px;">
						<div class="p-3 border-bottom bg-light">
							<h6 class="mb-0 fw-bold">Thông báo hệ thống</h6>
						</div>
						<div class="notification-list" style="max-height: 300px; overflow-y: auto;">
							<div *ngIf="notifications().length === 0" class="p-4 text-center text-muted">
								<i class="fas fa-check-circle d-block mb-2 fs-4"></i>
								Bạn đã xử lý hết mọi việc!
							</div>
							<a *ngFor="let item of notifications()" [routerLink]="item.link" class="dropdown-item p-3 border-bottom d-flex align-items-start gap-3">
								<div class="avatar-sm bg-primary-soft text-primary rounded-circle p-2">
									<i class="fas" [ngClass]="item.type === 'LISTING' ? 'fa-shopping-bag' : 'fa-exclamation-triangle'"></i>
								</div>
								<div>
									<p class="mb-1 fw-semibold text-wrap">{{ item.title }}</p>
									<p class="mb-1 text-muted fs-12px text-wrap">{{ item.message }}</p>
									<small class="text-primary">{{ item.time }}</small>
								</div>
							</a>
						</div>
					</div>
				</div>

				<div class="dropdown pl-2 py-2">
					<a href="#" class="dropdown-toggle text-heading pr-3 pr-sm-6 d-flex align-items-center justify-content-end" data-bs-toggle="dropdown" aria-expanded="false">
						<span class="me-2 d-none d-sm-inline">Admin</span>
						<img src="../assets/images/dashboard/avatar-2.png" alt="Admin" class="rounded-circle" width="40">
					</a>
					<div class="dropdown-menu dropdown-menu-end w-100">
						<a class="dropdown-item" href="/">Trang chủ</a>
						<a class="dropdown-item" (click)="logout()" href="#">Đăng xuất</a>
					</div>
				</div>
			</div>
		</nav>
	</div>
</header>
