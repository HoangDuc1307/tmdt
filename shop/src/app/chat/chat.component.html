<div class="chat-popup" *ngIf="isOpen">
  <div class="chat-header d-flex justify-content-between align-items-center p-2 text-white" 
       style="background-color: #5d7c6a;"> 
    <span class="fw-bold">
      <i class="bi bi-person-circle me-2"></i>
      {{ (recipientName && recipientName !== 'Người bán') ? recipientName : ('Người bán #' + recipientId) }}
    </span>
    <button class="btn-close btn-close-white" (click)="closeChat()"></button>
  </div>

  <div class="chat-body p-3 overflow-auto" #chatScroll style="height: 350px; background: #f4f4f4;">
    <div *ngFor="let msg of messages" class="mb-3 d-flex" 
         [ngClass]="{'justify-content-end': msg.sender === currentUser.id, 'justify-content-start': msg.sender !== currentUser.id}">
      
      <div [ngClass]="msg.sender === currentUser.id ? 'text-white' : 'bg-white border text-dark'" 
           [style.background-color]="msg.sender === currentUser.id ? '#5d7c6a' : ''"
           class="p-2 rounded-3 shadow-sm" style="max-width: 80%;">
        <div class="content">{{ msg.content }}</div>
        <small class="d-block mt-1 opacity-75" style="font-size: 10px;">
          {{ msg.created_at | date:'HH:mm' }}
        </small>
      </div>
    </div>
    
    <div *ngIf="messages.length === 0" class="text-center text-muted mt-5">
      <p>Hãy bắt đầu trò chuyện với <strong>{{ recipientName }}</strong> nhé!</p>
    </div>
  </div>

  <div class="chat-footer p-2 border-top bg-white">
    <div class="input-group">
      <input type="text" class="form-control form-control-sm" 
             placeholder="Nhập tin nhắn..." 
             [(ngModel)]="newMsg" 
             (keyup.enter)="send()">
      <button class="btn btn-sm text-white" 
              style="background-color: #5d7c6a;" 
              (click)="send()">
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>
</div>
