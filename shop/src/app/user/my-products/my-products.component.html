<div class="container mt-5 pt-5 mb-5" style="min-height: 60vh;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Quản lý tin đăng của tôi</h2>
    <div class="d-flex gap-3">
      <input type="text" class="form-control" placeholder="Tìm kiếm tên sản phẩm..." [(ngModel)]="searchTerm">
      <a routerLink="/add_product" class="btn btn-primary" style="white-space: nowrap;">Đăng bán mới</a>
    </div>
  </div>
  
  <table class="table table-bordered table-striped" *ngIf="products.length > 0">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Hình ảnh</th>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Trạng thái tồn kho</th>
        <th>Trạng thái duyệt</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of filteredProducts">
        <td>{{ p.id }}</td>
        <td><img [src]="p.image || 'assets/images/products/giay.jpg'" width="50" height="50"></td>
        <td>{{ p.name }}</td>
        <td>{{ p.price | currency:'VND':'symbol':'1.0-0' }}</td>
        <td>{{ p.status }}</td>
        <td>
          <span class="badge bg-success" *ngIf="p.is_approved">Đã duyệt</span>
          <span class="badge bg-warning text-dark" *ngIf="!p.is_approved">Chờ duyệt</span>
        </td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="deleteProduct(p.id)">Xoá</button>
        </td>
      </tr>
    </tbody>
  </table>
  
  <div class="alert alert-info" *ngIf="products.length === 0">
    Bạn chưa đăng bán sản phẩm nào.
  </div>
</div>
